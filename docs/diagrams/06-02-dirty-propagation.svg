    .section { font-size: 13px; font-weight: 700; fill: #2563eb; letter-spacing: 1.4px; }
    .section-sub { font-size: 12px; font-weight: 500; fill: #94a3b8; }
    .node-title { font-size: 15px; font-weight: 700; fill: #111827; }
