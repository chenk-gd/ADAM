openapi: 3.1.0
info:
  title: ADAM REST API
  description: Agent-oriented Development Asset Management System REST API
  version: 0.1.0

servers:
  - url: http://localhost:3000
    description: Local development server

security:
  - bearerAuth: []

paths:
  /health:
    get:
      operationId: healthCheck
      tags: [System]
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/asset-types:
    get:
      operationId: listAssetTypes
      tags: [AssetTypes]
      responses:
        "200":
          description: Asset types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssetTypeResponse"
    post:
      operationId: createAssetType
      tags: [AssetTypes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetTypeRequest"
      responses:
        "201":
          description: Asset type created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetTypeResponse"

  /api/v1/assets:
    get:
      operationId: listAssets
      tags: [Assets]
      parameters:
        - name: project_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: asset_type
          in: query
          schema:
            type: string
            format: uuid
        - name: state
          in: query
          schema:
            type: string
        - name: name_contains
          in: query
          schema:
            type: string
        - name: assignee
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Assets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedAssets"
    post:
      operationId: createAsset
      tags: [Assets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetRequest"
      responses:
        "201":
          description: Asset created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetResponse"

  /api/v1/assets/{id}:
    parameters:
      - $ref: "#/components/parameters/AssetId"
    get:
      operationId: getAsset
      tags: [Assets]
      responses:
        "200":
          description: Asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetResponse"
    put:
      operationId: updateAsset
      tags: [Assets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAssetRequest"
      responses:
        "200":
          description: Updated asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetResponse"
    delete:
      operationId: deleteAsset
      tags: [Assets]
      responses:
        "204":
          description: Deleted

  /api/v1/assets/{id}/archive:
    post:
      operationId: archiveAsset
      tags: [Assets]
      parameters:
        - $ref: "#/components/parameters/AssetId"
      responses:
        "204":
          description: Archived

  /api/v1/assets/{id}/releases:
    post:
      operationId: releaseAsset
      tags: [Versions]
      parameters:
        - $ref: "#/components/parameters/AssetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishRequest"
      responses:
        "200":
          description: Published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishResponse"

  /api/v1/assets/{id}/publish:
    post:
      operationId: publishAssetCompatibility
      tags: [Versions]
      description: Compatibility alias for /api/v1/assets/{id}/releases.
      parameters:
        - $ref: "#/components/parameters/AssetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishRequest"
      responses:
        "200":
          description: Published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishResponse"

  /api/v1/assets/{id}/manual-clean:
    post:
      operationId: manualCleanAsset
      tags: [DirtyQueue]
      parameters:
        - $ref: "#/components/parameters/AssetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveRequest"
      responses:
        "204":
          description: Clean review accepted

  /api/v1/assets/{id}/resolve:
    post:
      operationId: resolveDirtyCompatibility
      tags: [DirtyQueue]
      description: Compatibility alias for /api/v1/assets/{id}/manual-clean.
      parameters:
        - $ref: "#/components/parameters/AssetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveRequest"
      responses:
        "204":
          description: Clean review accepted

  /api/v1/assets/{id}/versions:
    get:
      operationId: listAssetVersions
      tags: [Versions]
      parameters:
        - $ref: "#/components/parameters/AssetId"
      responses:
        "200":
          description: Versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssetVersionResponse"

  /api/v1/assets/{id}/versions/{version}:
    get:
      operationId: getAssetVersion
      tags: [Versions]
      parameters:
        - $ref: "#/components/parameters/AssetId"
        - name: version
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetVersionResponse"

  /api/v1/assets/{id}/dependencies:
    get:
      operationId: listAssetDependencies
      tags: [Dependencies]
      parameters:
        - $ref: "#/components/parameters/AssetId"
      responses:
        "200":
          description: Upstream dependencies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssetDependencyResponse"

  /api/v1/assets/{id}/dependency-graph:
    get:
      operationId: getDependencyGraph
      tags: [Dependencies]
      parameters:
        - $ref: "#/components/parameters/AssetId"
      responses:
        "200":
          description: Direct dependency graph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DependencyGraphResponse"

  /api/workflow/events:
    get:
      operationId: listWorkflowEvents
      tags: [Workflow]
      parameters:
        - name: correlation_id
          in: query
          schema: { type: string, format: uuid }
        - name: asset_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: List of workflow events
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/WorkflowEvent" }
    post:
      operationId: postWorkflowEvent
      tags: [Workflow]
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateWorkflowEventRequest" }
      responses:
        "201":
          description: Event appended and rules evaluated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreatedActionsResponse" }

  /api/workflow/instances/{workflow_instance_id}:
    get:
      operationId: getWorkflowInstance
      tags: [Workflow]
      parameters:
        - name: workflow_instance_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Workflow instance
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WorkflowInstance" }
        "404":
          description: Instance not found

  /api/workflow/actions:
    get:
      operationId: listWorkflowActions
      tags: [Workflow]
      parameters:
        - name: target_asset_id
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: List of active workflow actions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/WorkflowAction" }

  /api/agent-tasks:
    get:
      operationId: listAgentTasks
      tags: [AgentTasks]
      parameters:
        - name: project_id
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { type: string }
        - name: capability
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Agent tasks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AgentTask" }

  /api/agent-tasks/{task_id}/claim:
    post:
      operationId: claimAgentTask
      tags: [AgentTasks]
      parameters:
        - name: task_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ClaimAgentTaskRequest" }
      responses:
        "200":
          description: Claimed task, or null if it was not queued
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/AgentTask"
                  - type: "null"
        "404":
          description: Task not found

  /api/agent-tasks/{task_id}/result:
    post:
      operationId: submitAgentTaskResult
      tags: [AgentTasks]
      parameters:
        - name: task_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SubmitAgentTaskResultRequest" }
      responses:
        "200":
          description: Completed task
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentTask" }
        "404":
          description: Task not found
        "409":
          description: Task state conflict

components:
  parameters:
    AssetId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    CreateAssetTypeRequest:
      type: object
      required: [name, display_name, description, metadata_schema]
      properties:
        name:
          type: string
        display_name:
          type: string
        description:
          type: string
        metadata_schema:
          type: object

    AssetTypeResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        display_name:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time

    CreateAssetRequest:
      type: object
      required: [name, asset_type_id, level, external_ref, source]
      properties:
        name:
          type: string
        asset_type_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
          nullable: true
        level:
          $ref: "#/components/schemas/AssetLevel"
        external_ref:
          type: string
        source:
          type: string
        metadata:
          type: object
          nullable: true
        idempotency_key:
          type: string
          nullable: true
        dependencies:
          type: array
          items:
            type: string
            format: uuid
          nullable: true

    UpdateAssetRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
        assignees:
          type: array
          items:
            type: string
          nullable: true
        metadata:
          type: object
          nullable: true

    PaginatedAssets:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AssetResponse"
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer
        total_pages:
          type: integer

    AssetResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        asset_type_id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
          nullable: true
        level:
          $ref: "#/components/schemas/AssetLevel"
        current_state:
          $ref: "#/components/schemas/AssetState"
        external_ref:
          type: string
        source:
          type: string
        metadata:
          type: object
        assignees:
          type: array
          items:
            type: string
        publisher:
          type: string
          nullable: true
        current_version:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AssetLevel:
      type: string
      enum: [project, organization]

    AssetState:
      type: string
      enum: [clean, dirty, archived]

    PublishRequest:
      type: object
      required: [version]
      properties:
        version:
          type: string
        release_notes:
          type: string
          nullable: true
        suggested_type:
          type: string
          nullable: true
        dependencies:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/PublishDependencyRequest"

    PublishDependencyRequest:
      type: object
      required: [upstream_asset_id, version]
      properties:
        upstream_asset_id:
          type: string
          format: uuid
        version:
          type: string
          description: Version constraint or baseline version, e.g. "^1.0.0" or "1.0.0"
        relationship:
          type: string
          nullable: true
          enum:
            - depends_on
            - references
            - implements
            - fixes
            - verifies
            - executes
            - produces
            - blocks
            - relates_to
        propagation_policy:
          type: string
          nullable: true
          enum:
            - dirty
            - context_only
            - audit_only
        upgrade_policy:
          type: string
          nullable: true
          enum:
            - auto_patch
            - auto_minor
            - notify
            - manual
            - pin

    PublishResponse:
      type: object
      properties:
        version:
          type: string
        affected_assets:
          type: array
          items:
            type: string
            format: uuid

    ResolveRequest:
      type: object
      properties:
        resolved_version:
          type: string
          nullable: true
        reviewed_by:
          type: string
          nullable: true
        resolutions:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/ManualCleanResolutionRequest"

    ManualCleanResolutionRequest:
      type: object
      required: [upstream_asset_id, from_version, to_version, review_result]
      properties:
        upstream_asset_id:
          type: string
          format: uuid
        from_version:
          type: string
        to_version:
          type: string
        review_result:
          type: string
        comment:
          type: string
          nullable: true

    AssetVersionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        asset_id:
          type: string
          format: uuid
        version_number:
          type: string
        metadata:
          type: object
        dependencies:
          type: array
          items:
            $ref: "#/components/schemas/DependencySnapshotResponse"
        release_notes:
          type: string
        suggested_type:
          type: string
          nullable: true
        released_by:
          type: string
        released_at:
          type: string
          format: date-time

    DependencySnapshotResponse:
      type: object
      properties:
        upstream_asset_id:
          type: string
          format: uuid
        upstream_version:
          type: string

    AssetDependencyResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        source_id:
          type: string
          format: uuid
        target_id:
          type: string
          format: uuid
        relationship:
          type: string
        declared_version:
          type: string
        effective_version:
          type: string
        effective_updated_by:
          type: string
        effective_reason:
          type: string
        created_at:
          type: string
          format: date-time

    DependencyGraphResponse:
      type: object
      properties:
        asset_id:
          type: string
          format: uuid
        upstream:
          type: array
          items:
            $ref: "#/components/schemas/AssetDependencyResponse"
        downstream:
          type: array
          items:
            $ref: "#/components/schemas/AssetDependencyResponse"

    CreateWorkflowEventRequest:
      type: object
      required: [event_type, source_asset_id, source_asset_type_id, payload]
      properties:
        event_type: { type: string }
        source_asset_id: { type: string, format: uuid }
        source_asset_type_id: { type: string, format: uuid }
        project_id:
          type: string
          format: uuid
          nullable: true
        correlation_id:
          type: string
          format: uuid
          nullable: true
        payload: {}
        cascade_depth:
          type: integer
          nullable: true

    WorkflowEvent:
      type: object
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        project_id:
          type: string
          format: uuid
          nullable: true
        correlation_id: { type: string, format: uuid }
        event_type: { type: string }
        source_asset_id: { type: string, format: uuid }
        source_asset_type_id: { type: string, format: uuid }
        payload: {}
        cascade_depth: { type: integer }
        triggering_action_id:
          type: string
          format: uuid
          nullable: true
        idempotency_key: { type: string }
        created_at: { type: string, format: date-time }

    WorkflowInstance:
      type: object
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        project_id:
          type: string
          format: uuid
          nullable: true
        correlation_id: { type: string, format: uuid }
        template: { type: string }
        status: { type: string }
        cascade_depth: { type: integer }
        lock_version: { type: integer, format: int64 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    WorkflowAction:
      type: object
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        instance_id: { type: string, format: uuid }
        action_type: { type: string }
        target_asset_id:
          type: string
          format: uuid
          nullable: true
        target_asset_type_id:
          type: string
          format: uuid
          nullable: true
        status: { type: string }
        lock_version: { type: integer, format: int64 }
        idempotency_key: { type: string }
        automation_level: { type: string }
        is_required: { type: boolean }
        order_index: { type: integer }
        retry_count: { type: integer }
        max_retries: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreatedActionsResponse:
      type: object
      properties:
        event:
          $ref: "#/components/schemas/WorkflowEvent"
        created_action_ids:
          type: array
          items: { type: string, format: uuid }
        cascade_exceeded:
          type: array
          items:
            type: object
            properties:
              rule_id: { type: string, format: uuid }
              depth: { type: integer }
              max: { type: integer }

    AgentTask:
      type: object
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        project_id:
          type: string
          format: uuid
          nullable: true
        action_id: { type: string, format: uuid }
        capability: { type: string }
        status: { type: string }
        agent_id:
          type: string
          nullable: true
        claimed_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        result_payload:
          nullable: true
        produced_asset_ids:
          type: array
          items: { type: string, format: uuid }
        lock_version: { type: integer, format: int64 }
        idempotency_key: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ClaimAgentTaskRequest:
      type: object
      required: [agent_id]
      properties:
        agent_id: { type: string }
        lease_seconds:
          type: integer
          nullable: true

    SubmitAgentTaskResultRequest:
      type: object
      required: [result_payload]
      properties:
        result_payload: {}
        produced_asset_ids:
          type: array
          items: { type: string, format: uuid }

    HealthResponse:
      type: object
      properties:
        status:
          type: string
        version:
          type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
